<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spagnolo A2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h2>🇪🇸 Spagnolo A2</h2>
    <nav>
      <a href="/">🏠 Menu</a>
      <a href="/en-a1/">A1</a>
      <a href="/en-a2/">A2</a>
      <a href="/en-a3/">A3</a>
    </nav>
  </header>

  <main>
    <button id="start-reset-btn" class="btn">🔄 Iniziamo la conversazione</button>
    <div id="chat-container">
      <div id="chat-log"></div>
      <input id="user-input" type="text" placeholder="Scrivi la tua frase...">
      <div class="buttons">
        <button id="send-btn">📩 Invia</button>
        <button id="voice-btn">🎤 Parla (ES)</button>
        <button id="listen-btn">🔊 Ascolta</button>
        <button id="clarify-btn">❓ Chiedi (IT)</button>
        <button id="translate-btn">🇮🇹 Traduci</button>
      </div>
    </div>

    <div id="model-info-box"></div>
  </main>

  <footer>
    <p>Impara le lingue — livello Spagnolo A2</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
