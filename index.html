<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impara le Lingue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌍 Impara le Lingue</h1>
  </header>

  <main>
    <!-- 🔵 Menù modelli -->
    <section class="model-block">
      <h2>⚙️ Seleziona il modello AI</h2>
      <label for="modelSelect">Modello:</label>
      <select id="modelSelect">
        <option>Caricamento...</option>
      </select>
    </section>

    <!-- 🔵 Lingue e livelli -->
    <section class="language-block">
      <h2>🇫🇷 Francese</h2>
      <div class="menu">
        <a class="btn" href="/fr-a1/">A1</a>
        <a class="btn" href="/fr-a2/">A2</a>
        <a class="btn" href="/fr-a3/">A3</a>
      </div>
    </section>

    <section class="language-block">
      <h2>🇬🇧 Inglese</h2>
      <div class="menu">
        <a class="btn" href="/en-a1/">A1</a>
        <a class="btn" href="/en-a2/">A2</a>
        <a class="btn" href="/en-a3/">A3</a>
      </div>
    </section>

    <section class="language-block">
      <h2>🇪🇸 Spagnolo</h2>
      <div class="menu">
        <a class="btn" href="/es-a1/">A1</a>
        <a class="btn" href="/es-a2/">A2</a>
        <a class="btn" href="/es-a3/">A3</a>
      </div>
    </section>
  </main>

  <footer>
    <p>Progetto Impara le Lingue — Menu principale</p>
  </footer>

  <script>
    // 🔧 Carica dinamicamente i modelli dal backend (proxy su Vercel)
    async function loadModels() {
      try {
        const response = await fetch("https://fabio-ai-chat.vercel.app/api/models");
        const data = await response.json();

        const select = document.getElementById("modelSelect");
        select.innerHTML = "";

        data.forEach(model => {
          const option = document.createElement("option");
          option.value = model.id;
          option.textContent = model.name || model.id;
          select.appendChild(option);
       });
       } catch (err) {
         console.error("Errore nel caricamento modelli:", err);
         const select = document.getElementById("modelSelect");
         select.innerHTML = "<option>Errore caricamento</option>";
      }
    }


    function getSelectedModel() {
      const select = document.getElementById("modelSelect");
      return select ? select.value : "openrouter/free";
    }

    // 🔧 Intercetta i click sui link delle lingue e aggiunge il modello scelto
    document.addEventListener("DOMContentLoaded", () => {
      loadModels();

      document.querySelectorAll(".menu a").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const model = getSelectedModel();
          const target = e.currentTarget.getAttribute("href");
          window.location.href = `${target}?model=${encodeURIComponent(model)}`;
        });
      });
    });
  </script>
</body>
</html>
