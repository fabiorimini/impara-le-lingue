<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impara le Lingue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌍 Impara le Lingue</h1>
  </header>

  <main>
    <!-- 🔵 Menù modelli -->
    <section class="model-block">
      <h2>⚙️ Seleziona il modello AI</h2>
      <label for="modelSelect">Modello:</label>
      <select id="modelSelect">
        <option>Caricamento...</option>
      </select>
    </section>

    <!-- 🔵 Lingue e livelli -->
    <section class="language-block">
      <h2>🇫🇷 Francese</h2>
      <div class="menu">
        <a class="btn" href="/fr-a1/">A1</a>
        <a class="btn" href="/fr-a2/">A2</a>
        <a class="btn" href="/fr-a3/">A3</a>
      </div>
    </section>

    <section class="language-block">
      <h2>🇬🇧 Inglese</h2>
      <div class="menu">
        <a class="btn" href="/en-a1/">A1</a>
        <a class="btn" href="/en-a2/">A2</a>
        <a class="btn" href="/en-a3/">A3</a>
      </div>
    </section>

    <section class="language-block">
      <h2>🇪🇸 Spagnolo</h2>
      <div class="menu">
        <a class="btn" href="/es-a1/">A1</a>
        <a class="btn" href="/es-a2/">A2</a>
        <a class="btn" href="/es-a3/">A3</a>
      </div>
    </section>
  </main>

  <footer>
    <p>Progetto Impara le Lingue — Menu principale</p>
  </footer>

  <script>
    // 🔧 Lista modelli OpenAI disponibili
    const OPENAI_MODELS = [
      { id: "gpt-4o-mini", name: "GPT‑4o Mini (veloce, economico)" },
      { id: "gpt-4o", name: "GPT‑4o (molto potente)" },
      { id: "gpt-4.1", name: "GPT‑4.1 (avanzato)" },
      { id: "gpt-4.1-mini", name: "GPT‑4.1 Mini (ottimo per chat)" }
    ];

    // 🔧 Carica i modelli nel menu
    function loadModels() {
      const select = document.getElementById("modelSelect");
      select.innerHTML = "";

      OPENAI_MODELS.forEach(model => {
        const option = document.createElement("option");
        option.value = model.id;
        option.textContent = model.name;
        select.appendChild(option);
      });
    }

    // 🔧 Ritorna il modello selezionato
    function getSelectedModel() {
      const select = document.getElementById("modelSelect");
      return select ? select.value : "gpt-4o-mini";
    }

    // 🔧 Aggiunge il modello all’URL quando scegli lingua/livello
    document.addEventListener("DOMContentLoaded", () => {
      loadModels();

      document.querySelectorAll(".menu a").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const model = getSelectedModel();
          const target = e.currentTarget.getAttribute("href");
          window.location.href = `${target}?model=${encodeURIComponent(model)}`;
        });
      });
    });
  </script>

</body>
</html>
