<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Impara le Lingue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .buttons {
      margin: 20px 0;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    label {
      font-weight: bold;
      margin-right: 10px;
    }
    select {
      padding: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Impara le Lingue</h1>

  <!-- 🔵 Menù modelli -->
  <div>
    <h2>Seleziona il modello AI</h2>
    <label for="modelSelect">Modello:</label>
    <select id="modelSelect"></select>
  </div>

  <!-- 🔵 Bottoni lingue e livelli -->
  <div class="buttons">
    <h2>Scegli la lingua e il livello</h2>
    <button onclick="goToPage('fr-a1')">Francese A1</button>
    <button onclick="goToPage('fr-a2')">Francese A2</button>
    <button onclick="goToPage('en-a1')">Inglese A1</button>
    <button onclick="goToPage('en-a2')">Inglese A2</button>
    <button onclick="goToPage('es-a1')">Spagnolo A1</button>
    <button onclick="goToPage('es-a2')">Spagnolo A2</button>
    <!-- aggiungi altri livelli/pagine se vuoi -->
  </div>

  <script>
    // 🔧 Carica dinamicamente i modelli da OpenRouter
    async function loadModels() {
      try {
        const response = await fetch("https://openrouter.ai/api/v1/models");
        const data = await response.json();

        const select = document.getElementById("modelSelect");
        select.innerHTML = "";

        data.forEach(model => {
          // Mostra solo quelli free
          if (model.id.includes(":free")) {
            const option = document.createElement("option");
            option.value = model.id;
            option.textContent = model.name || model.id;
            select.appendChild(option);
          }
        });
      } catch (err) {
        console.error("Errore nel caricamento modelli:", err);
      }
    }

    // 🔧 Funzione per ottenere il modello selezionato
    function getSelectedModel() {
      const select = document.getElementById("modelSelect");
      return select ? select.value : "openrouter/free";
    }

    // 🔧 Navigazione alle pagine lingue/ livelli
    function goToPage(page) {
      const model = getSelectedModel();
      // Passa il modello scelto come query string
      window.location.href = `${page}.html?model=${encodeURIComponent(model)}`;
    }

    // Carica i modelli quando la pagina è pronta
    document.addEventListener("DOMContentLoaded", loadModels);
  </script>
</body>
</html>
